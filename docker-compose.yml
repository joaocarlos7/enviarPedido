services:
  postgres:
    image: postgres:16
    container_name: pedidoFeito
    environment:
      POSTGRES_DB: pedidoFeitoDb
      POSTGRES_USER: pedidoFeitoAdmin
      POSTGRES_PASSWORD: pedidofeito123
    ports:
      - "5432:5432"
    volumes:
      - pedidos_data:/var/lib/postgresql/data

volumes:
  pedidos_data:
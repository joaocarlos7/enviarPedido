services:
  postgres:
    image: postgres:16
    container_name: enviarPedido
    environment:
      POSTGRES_DB: enviarPedido
      POSTGRES_USER: adm123
      POSTGRES_PASSWORD: adm123
    ports:
      - "5432:5432"
    volumes:
      - pedidos_data:/var/lib/postgresql/data

volumes:
  pedidos_data: